<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شركة المسة - الغلاف</title>
    <!-- خطوط احترافية من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Poppins:wght@200;300;600;800&display=swap" rel="stylesheet" />
    <style>
        /* ---------- إعادة تعيين وإعدادات أساسية ---------- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fce8f0; /* خلفية خارجية وردية فاتحة جداً */
            font-family: 'Cairo', 'Poppins', sans-serif;
            padding: 20px;
        }

        /* ---------- حاوية الغلاف (تبدو وكأنها بطاقة معمارية فاخرة) ---------- */
        .cover {
            position: relative;
            width: 1100px;
            max-width: 100%;
            height: 650px;
            max-height: 90vh;
            background: linear-gradient(145deg, #fbcfe8, #f472b6, #db2777);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(190, 24, 93, 0.35),
                        0 0 0 1px rgba(255, 255, 255, 0.2) inset;
            display: flex;
            align-items: center;
            padding: 50px 70px;
            transition: transform 0.3s ease;
        }

        .cover:hover {
            transform: scale(1.01);
        }

        /* ---------- العناصر الهندسية الخلفية (تُعطي طابع "المقاولات") ---------- */
        .cover::before {
            content: "";
            position: absolute;
            top: -30%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .cover::after {
            content: "";
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* شبكة خطوط خفيفة (إيحاء بالمخططات الهندسية) */
        .grid-lines {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* رقم 2023 كخلفية عملاقة دراماتيكية */
        .year-giant {
            position: absolute;
            left: -30px;
            bottom: -40px;
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            font-size: 280px;
            color: rgba(255, 255, 255, 0.06);
            letter-spacing: 15px;
            line-height: 1;
            pointer-events: none;
            z-index: 0;
            user-select: none;
        }

        /* شريط جانبي أنيق (للمسة الشركات) */
        .side-bar {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 12px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(4px);
            border-radius: 0 32px 32px 0;
            z-index: 1;
        }

        /* ---------- المحتوى الأساسي (في المقدمة) ---------- */
        .content {
            position: relative;
            z-index: 2;
            color: #ffffff;
            max-width: 80%;
        }

        /* أيقونة / وسام علوي */
        .badge {
            display: inline-block;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 25px;
            color: #fff;
            direction: ltr;
        }

        .badge span {
            font-weight: 600;
        }

        /* العنوان العربي */
        .content h1 {
            font-family: 'Cairo', sans-serif;
            font-weight: 900;
            font-size: clamp(38px, 7vw, 72px);
            line-height: 1.15;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .content h1 .highlight {
            color: #ffe4f0;
            border-bottom: 4px solid rgba(255, 255, 255, 0.5);
            padding-bottom: 2px;
        }

        /* فاصل زخرفي (خط + نقطة) */
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0 22px 0;
        }

        .divider .line {
            flex: 1;
            max-width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #ffffff, transparent);
            border-radius: 10px;
        }

        .divider .diamond {
            width: 10px;
            height: 10px;
            background: #ffffff;
            transform: rotate(45deg);
            opacity: 0.8;
            flex-shrink: 0;
        }

        /* العنوان الإنجليزي */
        .content h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 200;
            font-size: clamp(16px, 2.5vw, 30px);
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            line-height: 1.4;
            direction: ltr;
            text-align: left;
        }

        .content h2 strong {
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
        }

        /* جملة ثانوية (شعار الشركة) */
        .motto {
            margin-top: 30px;
            font-family: 'Cairo', sans-serif;
            font-weight: 300;
            font-size: clamp(14px, 1.2vw, 20px);
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 3px;
            border-right: 3px solid rgba(255, 255, 255, 0.4);
            padding-right: 18px;
            display: inline-block;
            backdrop-filter: blur(2px);
        }

        /* ---------- عناصر زخرفية صغيرة (نقاط ودوائر) ---------- */
        .deco-circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 1;
            pointer-events: none;
        }

        .deco-circle.c1 {
            width: 150px;
            height: 150px;
            top: 20px;
            left: 20px;
        }
        .deco-circle.c2 {
            width: 80px;
            height: 80px;
            bottom: 40px;
            right: 40px;
            border-width: 2px;
            opacity: 0.4;
        }

        /* ---------- التوافق مع الشاشات الصغيرة ---------- */
        @media (max-width: 768px) {
            .cover {
                padding: 30px 25px;
                height: auto;
                min-height: 500px;
                border-radius: 24px;
                align-items: center;
            }
            .content {
                max-width: 100%;
            }
            .year-giant {
                font-size: 120px;
                bottom: -10px;
                left: 0px;
            }
            .side-bar {
                width: 6px;
            }
            .content h1 {
                font-size: 38px;
            }
            .content h2 {
                font-size: 16px;
                letter-spacing: 3px;
            }
            .badge {
                font-size: 10px;
                padding: 5px 16px;
            }
            .divider .line {
                max-width: 50px;
            }
            .motto {
                font-size: 13px;
            }
            .deco-circle.c1 {
                width: 80px;
                height: 80px;
            }
        }

        @media (max-width: 480px) {
            .cover {
                padding: 20px 18px;
                min-height: 400px;
            }
            .year-giant {
                font-size: 80px;
            }
            .content h1 {
                font-size: 28px;
            }
            .content h2 {
                font-size: 12px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="cover">

        <!-- الشبكة الهندسية الخلفية -->
        <div class="grid-lines"></div>

        <!-- الرقم 2023 عملاق كخلفية -->
        <div class="year-giant">2023</div>

        <!-- دوائر زخرفية -->
        <div class="deco-circle c1"></div>
        <div class="deco-circle c2"></div>

        <!-- الشريط الجانبي -->
        <div class="side-bar"></div>

        <!-- المحتوى -->
        <div class="content">

            <!-- وسام علوي (إنجليزي مع رمز) -->
            <div class="badge">
                <span>✦</span> EST. 2023 <span>✦</span>
            </div>

            <!-- العنوان العربي -->
            <h1>
                شركة <span class="highlight">المسة</span><br />
                للمقاولات العامة
            </h1>

            <!-- الفاصل الزخرفي -->
            <div class="divider">
                <span class="line"></span>
                <span class="diamond"></span>
                <span class="line"></span>
            </div>

            <!-- العنوان الإنجليزي -->
            <h2>
                <strong>LAMSSA</strong> GENERAL<br />
                CONTRACTING COMPANY
            </h2>

            <!-- الشعار الثانوي -->
            <div class="motto">
                نبني المستقبل بإتقان ورؤية متطورة
            </div>

        </div>
    </div>

</body>
</html>
